<!doctype html><html lang='el'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Μηνιαίο πλάνο μαγειρέματος</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:24px;background:#f7f7f3;color:#1f2a24}.loader{max-width:560px;margin:18vh auto;padding:20px;border:1px solid #d9dfd2;border-radius:8px;background:white}h1{font-size:22px;margin:0 0 8px}p{line-height:1.5}</style></head><body><div class='loader'><h1>Μηνιαίο πλάνο μαγειρέματος</h1><p>Φόρτωση πλάνου...</p></div><script>(async()=>{const compressed=(await fetch('plan-gzip-b64.txt',{cache:'no-store'}).then(r=>r.text())).trim();const bytes=Uint8Array.from(atob(compressed),c=>c.charCodeAt(0));if(!('DecompressionStream'in window)){document.body.innerHTML='<div class="loader"><h1>Δεν υποστηρίζεται η αυτόματη φόρτωση</h1><p>Άνοιξε τη σελίδα με πρόσφατη έκδοση Chrome, Edge ή Safari.</p></div>';return}const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const fullHtml=await new Response(stream).text();document.open();document.write(fullHtml);document.close()})().catch(error=>{document.body.innerHTML='<div class="loader"><h1>Δεν φορτώθηκε το πλάνο</h1><p>Δοκίμασε ανανέωση της σελίδας.</p></div>';console.error(error)});</script></body></html>
